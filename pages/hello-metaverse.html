<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Vaporwave Physics</title>
	<meta property="og:title" content="VR Vaporwa(v|r)e">
	<meta property="og:description" content="A vaporwave-themed WebVR physics demo built with A-Frame.">
	<script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
	<script src="https://unpkg.com/aframe-text-component@0.5.2/dist/aframe-text-component.min.js"></script>
</head>
<body>
	<a-scene screenshot>
		<a-assets>
			<img id="pink" src="https://i.imgur.com/1hyyIUi.jpg" crossorigin="anonymous" />
			<img src="https://i.imgur.com/25P1geh.png" id="grid" crossorigin="anonymous">
			<img src="https://i.imgur.com/WMNH2OF.jpg" id="chrome" crossorigin="anonymous">
			<img id="sky" src="https://i.imgur.com/WqlqEkq.jpg" crossorigin="anonymous" />
			<a-mixin id="shiny" material="color: pink; metalness:1; roughness: 0.1; sphericalEnvMap: #sky;"></a-mixin>
			<a-mixin id="net"   material="color: pink; shader: flat; wireframe: true;"></a-mixin>
			<a-mixin id="matte" material="color: darkmagenta; metalness:0.75; roughness: 0.5; sphericalEnvMap: #sky;"></a-mixin>
		</a-assets>
		<a-sky src="#sky" rotation="0 -90 0"></a-sky>
		<a-entity position="0 0 0"
				  geometry="primitive: plane; width: 1000; height: 1000;" rotation="-90 0 0"
				  material="src: #grid; repeat: 1000 1000; transparent: true; metalness:0.6; roughness: 0.4; sphericalEnvMap: #sky;"></a-entity>

		<a-box rotation="0 -30 0" position="5 2 -4" height="3" width="2" depth="0.5" mixin="matte"></a-box>
		<a-box rotation="0 30 0" position="-5 2 -4" height="3" width="2" depth="0.5" mixin="matte"></a-box>
		<a-box rotation="0 30 0" position="4 2 4" height="3" width="2" depth="0.5" mixin="matte"></a-box>
		<a-box rotation="0 -30 0" position="-4 2 4" height="3" width="2" depth="0.5" mixin="matte"></a-box>

		<a-entity position="0 1.4 3">
			<a-camera user-height='0'></a-camera>
		</a-entity>

		<a-entity position="0 6 -10">
			<a-entity scale="1 1 1" geometry="primitive: torusKnot;" mixin="shiny">
				<a-animation easing="linear" attribute="rotation" dur="10000" to="0 0 360" repeat="indefinite"></a-animation>
			</a-entity>

			<a-entity geometry="primitive: tetrahedron; radius:4;" material="shader: flat; color: red; wireframe: true;">
				<a-animation direction="alternate" attribute="rotation" dur="8300" to="720 60 360" repeat="indefinite"></a-animation>
				<a-entity geometry="primitive: tetrahedron; radius:4;" material="shader: flat; color: red; wireframe: true;">
					<a-animation direction="alternate" attribute="rotation" dur="2000" to="0 -5 8" from="0 5 -8" repeat="indefinite"></a-animation>
					<a-entity geometry="primitive: tetrahedron; radius:4;" material="shader: flat; color: red; wireframe: true;">
						<a-animation direction="alternate" attribute="rotation" dur="2000" to="0 -5 8" from="0 5 -8" repeat="indefinite"></a-animation>
						<a-entity geometry="primitive: tetrahedron; radius:4;" material="shader: flat; color: red; wireframe: true;">
							<a-animation direction="alternate" attribute="rotation" dur="2000" to="0 -5 8" from="0 5 -8" repeat="indefinite"></a-animation>
						</a-entity>
					</a-entity>
				</a-entity>
			</a-entity>
		</a-entity>

		<a-entity position="-3 1 -6" rotation="5 0 0">
			<a-text value="Hello World" position="0 2 0.2" rotation="0 0 5" scale="3 3 3"
					color="lavenderblush"></a-text>
			<a-text value="VAPORWAVE" position="-0.5 0.5 -0.5" scale="4 4 4"
					color="pink"></a-text>
			<a-text value="Aesthetic" position="1 0 0.3" scale="2 2 2"
					color="white"></a-text>
		</a-entity>

		<a-entity light="color: #ccccff; intensity: 1; type: ambient;"></a-entity>
		<a-entity light="color: #ffaaff; intensity: 1.5" position="5 5 5"></a-entity>
		<a-entity light="color: white; intensity: 0.5" position="-5 5 15"></a-entity>
		<a-entity light="color: white; type: ambient;"></a-entity>
	</a-scene>
</body>
</html>
